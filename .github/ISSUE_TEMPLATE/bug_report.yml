name: Bug report
description: Report a bug to help us improve
title: "[Bug]: "
labels: ["bug"]
assignees: " "
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment (please complete the following information)
      description: Please provide details about your setup.
      value: |
        - OS: [e.g. Windows10, macOS Monterey]
        - Python version: [e.g. 3.8.1]
        - Related module versions if applicable: [e.g. numpy=1.23.5]
      render: markdown

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
      placeholder: e.g., screenshots, related issues, etc.
