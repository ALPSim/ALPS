name: ALPS Python Packaging CI/CD

on:
  push:
    branches:
      - master    # the default branch
    tags:
      - 'v*'    # this triggers the workflow when a tag starting with 'v' is pushed
  pull_request:
    branches:
      - master

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.plat.os }}
    runs-on: ${{ matrix.plat.os }}
    strategy:
      matrix:
        # macos-13 is an intel runner, macos-14 is apple silicon
        plat: 
        - { os: ubuntu-latest, target: "", arch: x86_64, homebrew: ''}
        #- { os: macos-13, target: "13.0" , arch: x86_64, homebrew: '/usr/local'} #DEPRECATED. Too old.
        - { os: macos-15, target: "15.0" , arch: arm64, homebrew: '/opt/homebrew'}
        - { os: macos-26, target: "26.0" , arch: arm64, homebrew: '/opt/homebrew'}

    steps:
      - uses: actions/checkout@v4

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: _build/ccache
          key: pyalps-ccache-${{ runner.os }}-${{ matrix.plat.arch }}-${{ hashFiles('src/**', 'bindings/python/**', 'applications/**', 'tool/maxent*') }}
          restore-keys: pyalps-ccache-${{ runner.os }}-${{ matrix.plat.arch }}-

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: bindings/python/pyalps
        env:
          CIBW_BUILD: cp310-* cp311-* cp312-* cp313-* cp314-*
          CIBW_ARCHS: ${{ matrix.plat.arch }}
          CIBW_ARCHS_MACOS: ${{ matrix.plat.arch }}
          CIBW_ENVIRONMENT: >
            ALPS_DIR=$(pwd)/_build/cibw-install/share/alps
            CCACHE_DIR=$(pwd)/_build/ccache
            CCACHE_NAMESPACE=pyalps-wheel
            CMAKE_ARGS="-DCMAKE_CXX_COMPILER_LAUNCHER=ccache"
          CIBW_BEFORE_ALL_LINUX: >
            dnf install -y ccache cmake hdf5-devel lapack-devel ninja-build &&
            cmake -S {project} -B {project}/_build/cibw-alps -G Ninja
            -DCMAKE_BUILD_TYPE=Release
            -DCMAKE_INSTALL_PREFIX={project}/_build/cibw-install
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
            -DALPS_BUILD_LIBS_ONLY=ON
            -DALPS_BUILD_TESTS=OFF
            -DALPS_BUILD_EXAMPLES=OFF
            -DALPS_BUILD_APPLICATIONS=OFF
            -DALPS_ENABLE_MPI=OFF &&
            cmake --build {project}/_build/cibw-alps --target install -j2
          CIBW_BEFORE_ALL_MACOS: >
            brew install ccache cmake hdf5 ninja &&
            cmake -S {project} -B {project}/_build/cibw-alps -G Ninja
            -DCMAKE_BUILD_TYPE=Release
            -DCMAKE_INSTALL_PREFIX={project}/_build/cibw-install
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
            -DALPS_BUILD_LIBS_ONLY=ON
            -DALPS_BUILD_TESTS=OFF
            -DALPS_BUILD_EXAMPLES=OFF
            -DALPS_BUILD_APPLICATIONS=OFF
            -DALPS_ENABLE_MPI=OFF
            -DHDF5_ROOT=${{ matrix.plat.homebrew }}/opt/hdf5 &&
            cmake --build {project}/_build/cibw-alps --target install -j2
          CIBW_ENVIRONMENT_MACOS: >
            ALPS_DIR=$(pwd)/_build/cibw-install/share/alps
            CCACHE_DIR=$(pwd)/_build/ccache
            CCACHE_NAMESPACE=pyalps-wheel
            CMAKE_ARGS="-DCMAKE_CXX_COMPILER_LAUNCHER=ccache"
            MACOSX_DEPLOYMENT_TARGET=${{ matrix.plat.target }}
            CXXFLAGS="-stdlib=libc++"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            auditwheel repair -w {dest_dir} {wheel} &&
            auditwheel show {dest_dir}/*.whl
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel} &&
            delocate-listdeps --all {dest_dir}/*.whl
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: pytest -q {project}/test/pyalps

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.plat.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl


  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist --outdir dist bindings/python/pyalps

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz


  upload_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    #if: github.event_name == 'release' && github.event.action == 'published'
    # or, alternatively, upload to PyPI on every tag starting with 'v' (remove on: release above to use this)
    if: startsWith(github.ref, 'refs/tags/v')  || github.event_name == 'release'
    steps:
      - uses: actions/download-artifact@v4
        with:
          # unpacks all CIBW artifacts into dist/
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        #with:
          # To test: 
          # repository-url: https://test.pypi.org/legacy/
